sonar.projectKey=restwalker
sonar.projectName=restwalker

# Source / test layout (the app is the Node/TS daemon under node/)
sonar.sources=node
sonar.tests=node/test
sonar.test.inclusions=node/test/**/*.test.ts
sonar.exclusions=node/node_modules/**,node/coverage/**,index.html

# Coverage (generated by `npm run coverage` in node/)
sonar.javascript.lcov.reportPaths=node/coverage/lcov.info
sonar.sourceEncoding=UTF-8
